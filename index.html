<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>♠ Poker GTO Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=IBM+Plex+Mono:wght@300;400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS ──────────────────────────────────────────── */
:root{
  --bg:         #04080a;
  --bg1:        #080e11;
  --bg2:        #0c151a;
  --bg3:        #111d24;
  --bg4:        #162028;
  --glass:      rgba(255,255,255,.03);
  --glass2:     rgba(255,255,255,.06);

  --gold:       #c8a74a;
  --gold2:      #e3c96a;
  --gold3:      #f5e4a8;
  --gold-dim:   rgba(200,167,74,.15);
  --gold-line:  rgba(200,167,74,.2);

  --green:      #3ab06b;
  --green2:     #4dcc82;
  --green-dim:  rgba(58,176,107,.12);
  --green-line: rgba(58,176,107,.25);

  --red:        #d95f5f;
  --red2:       #f07070;
  --red-dim:    rgba(217,95,95,.12);

  --blue:       #5a9cf5;
  --blue-dim:   rgba(90,156,245,.12);

  --text:       #e8e0cc;
  --text2:      #8fa898;
  --text3:      #4a6055;
  --text4:      #2a3830;

  --border:     rgba(200,167,74,.14);
  --border2:    rgba(255,255,255,.06);

  --r-sm:       8px;
  --r-md:       12px;
  --r-lg:       16px;

  --shadow-sm:  0 2px 8px rgba(0,0,0,.4);
  --shadow-md:  0 4px 20px rgba(0,0,0,.5);
  --shadow-lg:  0 8px 40px rgba(0,0,0,.6);
  --shadow-gold: 0 0 20px rgba(200,167,74,.15);
}

/* ── RESET ──────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── SCROLLBAR ──────────────────────────────────────────────── */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gold-line);border-radius:2px}

/* ── KEYFRAMES ──────────────────────────────────────────────── */
@keyframes spin    {to{transform:rotate(360deg)}}
@keyframes fadeUp  {from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn  {from{opacity:0}to{opacity:1}}
@keyframes pop     {from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes slideIn {from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes glow    {0%,100%{box-shadow:0 0 8px rgba(200,167,74,.2)}50%{box-shadow:0 0 18px rgba(200,167,74,.4)}}
@keyframes pulse   {0%,100%{opacity:1}50%{opacity:.5}}
@keyframes barGrow {from{width:0}to{width:var(--w)}}

.anim-up   {animation:fadeUp  .32s cubic-bezier(.22,1,.36,1) both}
.anim-in   {animation:fadeIn  .25s ease both}
.anim-pop  {animation:pop     .26s cubic-bezier(.22,1,.36,1) both}
.anim-slide{animation:slideIn .28s cubic-bezier(.22,1,.36,1) both}

/* ── HEADER ─────────────────────────────────────────────────── */
#header{
  position:sticky;top:0;z-index:100;
  background:linear-gradient(180deg,var(--bg1) 0%,rgba(8,14,17,.95) 100%);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);
  padding:0 28px;
  display:flex;align-items:center;justify-content:space-between;
  height:64px;
}
.logo{
  font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 40%,var(--gold3) 70%,var(--gold) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:3px;line-height:1;
}
.logo-sub{font-size:8px;color:var(--text3);letter-spacing:5px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;margin-top:3px}
.badge-offline{
  font-size:9px;font-family:'IBM Plex Mono',monospace;letter-spacing:1.5px;
  color:var(--green);background:var(--green-dim);border:1px solid var(--green-line);
  padding:4px 12px;border-radius:20px;display:flex;align-items:center;gap:5px;
}
.badge-offline::before{content:"●";animation:pulse 2s infinite}

/* ── TABS ───────────────────────────────────────────────────── */
#tabs{
  background:var(--bg1);border-bottom:1px solid var(--border);
  display:flex;overflow-x:auto;padding:0 24px;
  position:sticky;top:64px;z-index:99;
}
#tabs::-webkit-scrollbar{display:none}
.tab{
  padding:16px 20px;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
  font-family:'IBM Plex Mono',monospace;color:var(--text3);
  border-bottom:2px solid transparent;cursor:pointer;
  transition:color .2s,border-color .2s;white-space:nowrap;position:relative;
}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab:hover:not(.active){color:var(--text2)}

/* ── LAYOUT ─────────────────────────────────────────────────── */
.page{padding:24px 28px;min-height:calc(100vh - 120px);animation:fadeIn .2s ease}
.two-col{display:grid;grid-template-columns:1fr 300px;gap:20px}
.three-col{display:grid;grid-template-columns:280px 1fr 260px;gap:16px}

/* ── PANEL ──────────────────────────────────────────────────── */
.panel{
  background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-lg);
  box-shadow:var(--shadow-sm);overflow:hidden;
}
.panel-gold{border-color:var(--border)}
.panel-header{
  padding:16px 20px;border-bottom:1px solid var(--border2);
  display:flex;align-items:center;justify-content:space-between;
}
.panel-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--gold)}
.panel-body{padding:18px 20px}

/* ── SECTION LABEL ──────────────────────────────────────────── */
.slabel{
  font-size:9px;letter-spacing:2.5px;text-transform:uppercase;
  font-family:'IBM Plex Mono',monospace;color:var(--text3);margin-bottom:8px;
}

/* ── BUTTONS ────────────────────────────────────────────────── */
button{cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .15s;outline:none}
button:hover:not(:disabled){filter:brightness(1.12)}
button:active:not(:disabled){transform:scale(.97)}
button:disabled{opacity:.35;cursor:not-allowed}

.btn-primary{
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 100%);
  color:#050a08;padding:13px 28px;border-radius:var(--r-sm);
  font-size:12px;font-weight:700;letter-spacing:.5px;
  box-shadow:0 2px 12px rgba(200,167,74,.3);
}
.btn-primary:hover:not(:disabled){box-shadow:0 4px 20px rgba(200,167,74,.45)}

.btn-ghost{
  background:transparent;border:1px solid var(--border);color:var(--text2);
  padding:10px 18px;border-radius:var(--r-sm);font-size:12px;
}
.btn-ghost:hover:not(:disabled){background:var(--glass);border-color:var(--gold-line);color:var(--gold)}

.btn-action{
  padding:13px 22px;border-radius:var(--r-sm);font-size:13px;font-weight:600;
  letter-spacing:.3px;transition:all .18s;
}
.btn-fold{background:var(--red-dim);border:1px solid rgba(217,95,95,.3);color:var(--red2)}
.btn-fold:hover{background:rgba(217,95,95,.2);border-color:rgba(217,95,95,.5)}
.btn-call{background:var(--green-dim);border:1px solid rgba(58,176,107,.3);color:var(--green2)}
.btn-call:hover{background:rgba(58,176,107,.22);border-color:rgba(58,176,107,.5)}
.btn-raise{background:var(--gold-dim);border:1px solid rgba(200,167,74,.3);color:var(--gold2)}
.btn-raise:hover{background:rgba(200,167,74,.22);border-color:rgba(200,167,74,.5)}

/* TOGGLE PILLS */
.pill-group{display:flex;background:var(--bg1);border:1px solid var(--border2);border-radius:8px;padding:3px;gap:2px}
.pill{padding:7px 14px;border-radius:5px;font-size:10px;font-weight:600;letter-spacing:1px;
  font-family:'IBM Plex Mono',monospace;color:var(--text3);transition:all .18s}
.pill.active{background:var(--gold-dim);border:1px solid var(--border);color:var(--gold)}
.pill-green.active{background:var(--green-dim);border:1px solid var(--green-line);color:var(--green2)}
.pill:hover:not(.active){color:var(--text2)}

/* POS CHIPS */
.pos-chips{display:flex;gap:4px;flex-wrap:wrap}
.pos-chip{padding:5px 12px;border-radius:6px;font-size:10px;font-weight:600;letter-spacing:.5px;
  font-family:'IBM Plex Mono',monospace;background:var(--bg3);border:1px solid var(--border2);color:var(--text3);transition:all .15s}
.pos-chip.active-gold{background:var(--gold-dim);border-color:var(--border);color:var(--gold)}
.pos-chip.active-green{background:var(--green-dim);border-color:var(--green-line);color:var(--green2)}
.pos-chip:hover:not(.active-gold):not(.active-green){color:var(--text2);border-color:var(--border)}

/* ── PLAYING CARDS ──────────────────────────────────────────── */
.pcard{
  background:linear-gradient(145deg,#ffffff,#f0f0f0);
  border-radius:5px;border:1px solid rgba(0,0,0,.12);
  display:flex;flex-direction:column;padding:3px 5px;
  box-shadow:0 2px 8px rgba(0,0,0,.55),0 1px 2px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.8);
  flex-shrink:0;position:relative;
}
.pcard-back{
  background:linear-gradient(135deg,#0f2540 0%,#1a3a6e 40%,#0f2540 100%);
  border:1px solid rgba(255,255,255,.12);border-radius:5px;flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,.5);
}
.pcard-rank{font-weight:800;line-height:1;font-family:'IBM Plex Mono',monospace}
.pcard-suit{line-height:1}

/* CARD SLOT */
.card-slot{
  border-radius:7px;border:1.5px dashed rgba(200,167,74,.3);
  background:rgba(200,167,74,.03);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .18s;flex-shrink:0;
}
.card-slot:hover{border-color:var(--gold);background:rgba(200,167,74,.08);box-shadow:var(--shadow-gold)}
.card-slot.filled{border-style:solid;border-color:rgba(200,167,74,.3);background:transparent}
.card-slot-plus{font-size:18px;color:var(--text3);transition:color .15s}
.card-slot:hover .card-slot-plus{color:var(--gold)}

/* ── RANGE GRID ─────────────────────────────────────────────── */
.rg-wrap{overflow-x:auto;padding-bottom:4px}
.rg-wrap::-webkit-scrollbar{height:2px}
.rg-grid{user-select:none;display:inline-flex;flex-direction:column;gap:1px}
.rg-row{display:flex;gap:1px}
.rg-head-cell{display:flex;align-items:center;justify-content:center;
  font-size:8.5px;color:var(--text3);font-family:'IBM Plex Mono',monospace;font-weight:600}
.rg-cell{
  border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  border:1px solid transparent;transition:filter .1s,border-color .12s;
}
.rg-cell:hover{filter:brightness(1.45);border-color:rgba(255,255,255,.35)}
.rg-cell.sel{border-color:rgba(255,255,255,.75)!important;box-shadow:0 0 8px rgba(255,255,255,.25)}
.rg-cell span{font-size:7px;font-family:'IBM Plex Mono',monospace;font-weight:700;opacity:.85;line-height:1;text-align:center;pointer-events:none}

/* ── FREQ BARS ──────────────────────────────────────────────── */
.fbar{margin-bottom:9px}
.fbar-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.fbar-lbl{font-size:11px;color:var(--text2);font-family:'IBM Plex Mono',monospace}
.fbar-pct{font-size:12px;font-weight:600;font-family:'IBM Plex Mono',monospace}
.fbar-track{height:4px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
.fbar-fill{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.22,1,.36,1)}

/* ── GRADE BADGE ────────────────────────────────────────────── */
.grade{border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:800;font-family:'IBM Plex Mono',monospace;flex-shrink:0;letter-spacing:-0.5px}

/* ── STAT CARDS ─────────────────────────────────────────────── */
.stat-card{
  background:var(--bg1);border:1px solid var(--border2);border-radius:var(--r-sm);
  padding:12px 14px;text-align:center;
}
.stat-val{font-size:22px;font-weight:700;font-family:'IBM Plex Mono',monospace;line-height:1}
.stat-lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-top:4px;font-family:'IBM Plex Mono',monospace}

/* ── INSIGHT BOXES ──────────────────────────────────────────── */
.ib{border-radius:var(--r-sm);padding:13px 15px}
.ib-gold{background:rgba(200,167,74,.04);border:1px solid rgba(200,167,74,.15)}
.ib-green{background:rgba(58,176,107,.04);border:1px solid rgba(58,176,107,.15)}
.ib-blue{background:rgba(90,156,245,.04);border:1px solid rgba(90,156,245,.15)}
.ib-red{background:rgba(217,95,95,.04);border:1px solid rgba(217,95,95,.15)}
.ib-title{font-size:8.5px;letter-spacing:2.5px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;margin-bottom:7px}
.ib-body{font-size:12.5px;line-height:1.75;color:var(--text)}

/* ── STREET PILL ────────────────────────────────────────────── */
.sp{padding:3px 10px;border-radius:20px;font-size:9px;font-weight:600;letter-spacing:2px;
  text-transform:uppercase;font-family:'IBM Plex Mono',monospace;display:inline-flex;align-items:center}

/* ── DIVIDER ────────────────────────────────────────────────── */
.divider{height:1px;background:var(--border2);margin:14px 0}

/* ── POKER TABLE ────────────────────────────────────────────── */
.poker-table{
  background:radial-gradient(ellipse at 50% 60%,#1d8a4d 0%,#0d5a2d 55%,#08401f 100%);
  border-radius:200px;position:relative;
  border:10px solid #3a2b1c;
  box-shadow:0 0 0 3px #5a3e28,inset 0 0 70px rgba(0,0,0,.55),0 24px 60px rgba(0,0,0,.85),0 0 0 4px #2a1e10;
  display:flex;align-items:center;justify-content:center;
}

/* ── CARD PICKER MODAL ──────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.modal{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:22px;max-width:440px;width:92%;box-shadow:var(--shadow-lg);
  animation:pop .22s cubic-bezier(.22,1,.36,1);
}
.modal-title{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--gold);
  letter-spacing:3px;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.cp-grid{display:grid;grid-template-columns:repeat(13,1fr);gap:3px;margin-bottom:16px}
.cp-cell{
  aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;
  font-size:8.5px;font-weight:700;font-family:'IBM Plex Mono',monospace;cursor:pointer;
  background:rgba(255,255,255,.06);border:1px solid transparent;transition:all .12s;
  line-height:1.1;text-align:center;
}
.cp-cell:hover:not(.used){background:rgba(255,255,255,.14);border-color:var(--gold);transform:scale(1.08)}
.cp-cell.used{opacity:.2;cursor:not-allowed}

/* ── EV CALCULATOR ──────────────────────────────────────────── */
.ev-input-group{margin-bottom:16px}
.ev-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;
  color:var(--text3);margin-bottom:7px;display:flex;align-items:center;gap:6px}
.ev-input{
  width:100%;background:var(--bg1);border:1px solid var(--border2);border-radius:var(--r-sm);
  padding:11px 14px;color:var(--text);font-size:14px;font-family:'IBM Plex Mono',monospace;
  outline:none;transition:border-color .15s;
}
.ev-input:focus{border-color:var(--border);background:var(--bg2)}
.ev-slider{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:2px;
  background:var(--bg3);outline:none;cursor:pointer;margin-top:6px}
.ev-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;
  border-radius:50%;background:var(--gold);cursor:pointer;box-shadow:0 0 8px rgba(200,167,74,.5)}

.ev-result-card{
  background:var(--bg1);border:1px solid var(--border2);border-radius:var(--r-md);
  padding:18px;text-align:center;transition:all .3s;
}
.ev-result-val{
  font-size:36px;font-weight:700;font-family:'IBM Plex Mono',monospace;
  line-height:1.1;margin:4px 0;
}
.ev-result-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;color:var(--text3)}

.ev-compare{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.ev-comp-card{background:var(--bg1);border:1px solid var(--border2);border-radius:var(--r-sm);padding:14px;text-align:center}
.ev-comp-val{font-size:22px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.ev-comp-lbl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;color:var(--text3);margin-top:4px}

.ev-breakdown{background:var(--bg1);border-radius:var(--r-sm);overflow:hidden}
.ev-breakdown-row{display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-bottom:1px solid var(--border2);font-size:12px}
.ev-breakdown-row:last-child{border-bottom:none}
.ev-breakdown-lbl{color:var(--text3);font-family:'IBM Plex Mono',monospace;font-size:11px}
.ev-breakdown-val{font-weight:600;font-family:'IBM Plex Mono',monospace}

/* ── MISC ───────────────────────────────────────────────────── */
.legend-dot{width:11px;height:11px;border-radius:2px;flex-shrink:0}
.hand-display{
  font-size:56px;font-weight:700;color:var(--gold);font-family:'IBM Plex Mono',monospace;
  letter-spacing:4px;line-height:1;text-shadow:0 0 30px rgba(200,167,74,.3);
}
.streak-badge{
  display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;
  background:rgba(200,167,74,.1);border:1px solid var(--border);font-family:'IBM Plex Mono',monospace;
  font-size:11px;color:var(--gold);
}
.result-correct{border-color:var(--green-line)!important;background:rgba(58,176,107,.03)!important}
.result-wrong{border-color:rgba(217,95,95,.25)!important;background:rgba(217,95,95,.03)!important}

/* Board texture chips */
.tex-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;
  font-size:9px;font-weight:600;font-family:'IBM Plex Mono',monospace;letter-spacing:.5px}
.tex-wet{background:rgba(90,156,245,.1);color:var(--blue);border:1px solid rgba(90,156,245,.2)}
.tex-dry{background:rgba(200,167,74,.1);color:var(--gold);border:1px solid var(--border)}
.tex-mono{background:rgba(217,95,95,.1);color:var(--red2);border:1px solid rgba(217,95,95,.2)}
.tex-pair{background:rgba(58,176,107,.1);color:var(--green2);border:1px solid var(--green-line)}

/* quiz big card */
.quiz-card{
  background:linear-gradient(145deg,var(--bg2),var(--bg3));
  border:1px solid var(--border);border-radius:20px;
  padding:36px 32px;
  display:flex;flex-direction:column;align-items:center;gap:18px;
  box-shadow:var(--shadow-md),inset 0 1px 0 rgba(255,255,255,.04);
  position:relative;overflow:hidden;
}
.quiz-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(200,167,74,.06) 0%,transparent 65%);
  pointer-events:none;
}

/* Scenario card */
.sc-situation{
  background:var(--bg1);border:1px solid var(--border2);border-radius:var(--r-sm);
  padding:14px 16px;font-size:13px;line-height:1.75;color:var(--text);
}
.sc-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
</style>
</head>
<body>
<div id="header">
  <div>
    <div class="logo">♠ POKER TRAINER</div>
    <div class="logo-sub">GTO Offline Edition · 6-max NL Hold'em</div>
  </div>
  <div style="display:flex;gap:12px;align-items:center">
    <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);text-align:right;line-height:1.6">
      GTO Solver<br><span style="color:var(--gold)">100% Local</span>
    </div>
    <div class="badge-offline">OFFLINE</div>
  </div>
</div>
<div id="tabs">
  <div class="tab active" data-tab="quiz"  onclick="switchTab('quiz')" >🎯 Quiz</div>
  <div class="tab"        data-tab="scenarios" onclick="switchTab('scenarios')">📋 Escenarios</div>
  <div class="tab"        data-tab="ranges"    onclick="switchTab('ranges')"   >♟ Rangos</div>
  <div class="tab"        data-tab="analyzer"  onclick="switchTab('analyzer')" >🔬 Analizador</div>
  <div class="tab"        data-tab="ev"        onclick="switchTab('ev')"       >📐 EV Calc</div>
</div>
<div id="page"></div>

<script>
function switchTab(t){
  document.querySelectorAll(".tab").forEach(el=>el.classList.toggle("active",el.dataset.tab===t));
  S.tab=t;renderPage();
}

//  BOARD ANALYSIS ENGINE
// ═══════════════════════════════════════════════════════════════
function parseHandKey(h){
  if(h.length===2){return{r1:RANK_VAL[h[0]],r2:RANK_VAL[h[1]],suited:false,isPair:true};}
  return{r1:RANK_VAL[h[0]],r2:RANK_VAL[h[1]],suited:h[2]==='s',isPair:false};
}

function handBoardStrength(handKey, board){
  if(!board||board.length===0) return 5;
  const {r1,r2,suited,isPair}=parseHandKey(handKey);
  const bCards=board.map(parseCard);
  const bVals=bCards.map(c=>c.val);
  const bSuits=bCards.map(c=>c.suit);
  const maxBoard=Math.max(...bVals);

  // Count board hits for each hole card
  const h1hits=bVals.filter(v=>v===r1).length;
  const h2hits=bVals.filter(v=>v===r2).length;

  // Sets, quads
  if(isPair&&h1hits>=2) return 10;
  if(isPair&&h1hits===1) return 9;  // set
  if(h1hits>=2||h2hits>=2) return 9; // trips
  // Two pair
  if(h1hits>=1&&h2hits>=1) return 8;
  // Overpair
  if(isPair&&r1>maxBoard) return 7;
  // Top pair
  if((h1hits>=1&&r1>=maxBoard)||(h2hits>=1&&r2>=maxBoard)) return 7;
  // Pair
  if(h1hits>=1||h2hits>=1) return 5;

  // Flush draw (suited hand + 2 same suit on board)
  if(suited&&board.length>=2){
    const suitCnt={};
    bSuits.forEach(s=>suitCnt[s]=(suitCnt[s]||0)+1);
    if(Math.max(...Object.values(suitCnt))>=2) return 4;
  }

  // Straight potential (simplified)
  const allV=[r1,r2,...bVals];
  const uniq=[...new Set(allV)].sort((a,b)=>a-b);
  let maxSpan=1,run=1;
  for(let i=1;i<uniq.length;i++){
    if(uniq[i]-uniq[i-1]<=2){run++;maxSpan=Math.max(maxSpan,run);}
    else run=1;
  }
  if(maxSpan>=5) return 6; // straight
  if(maxSpan>=4) return 3; // open-ended draw

  // High cards
  if(r1>=12||r2>=12) return 2;
  return 1;
}

function strengthToRangeColor(s,inRange){
  if(!inRange) return "#09130b";
  if(s>=10) return "#0d4a22";
  if(s>=9)  return "#0f5a28";
  if(s>=8)  return "#146830";
  if(s>=7)  return "#1a7a38";
  if(s>=6)  return "#1a5e38";
  if(s>=5)  return "#1e5a30";
  if(s>=4)  return "#3d5410";
  if(s>=3)  return "#5a3a0a";
  if(s>=2)  return "#3a2008";
  return "#1a120a";
}

}

// Board texture analysis
function boardTexture(board){
  if(!board||board.length<3) return null;
  const cards=board.map(parseCard);
  const vals=cards.map(c=>c.val).sort((a,b)=>b-a);
  const suits=cards.map(c=>c.suit);
  const suitCnt={};
  suits.forEach(s=>suitCnt[s]=(suitCnt[s]||0)+1);
  const maxSuit=Math.max(...Object.values(suitCnt));
  const isPaired=new Set(vals).size<vals.length;
  const gap=vals[0]-vals[vals.length-1];
  const isMonotone=maxSuit===3;
  const isTwoTone=maxSuit===2;
  const isConnected=gap<=4;
  const highRank=vals[0];

  let wet=0;
  if(isMonotone) wet+=3;
  else if(isTwoTone) wet+=1;
  if(isConnected) wet+=2;
  if(!isPaired) wet+=1;

  return{isPaired,isMonotone,isTwoTone,isConnected,wet,highRank,ranks:vals,suits};
}

function textureLabel(tex){
  if(!tex) return "";
  let tags=[];
  if(tex.isPaired) tags.push("PAREADA");
  if(tex.isMonotone) tags.push("MONÓTONA");
  else if(tex.isTwoTone) tags.push("DOS COLORES");
  else tags.push("RAINBOW");
  if(tex.isConnected) tags.push("CONECTADA");
  const wetLabel=tex.wet>=5?"MUY HÚMEDA":tex.wet>=3?"HÚMEDA":tex.wet>=1?"SEMI-SECA":"SECA";
  tags.push(wetLabel);
  return tags.join(" · ");
}

let _scId=0;
function genScenario(opts={}){
  const type=opts.type||rnd(["rfi","bb_defend","3bet","cbet","facing_cbet","turn","river"]);
  switch(type){
    case "rfi": return genRFI(opts);
    case "bb_defend": return genBBDefend(opts);
    case "3bet": return gen3bet(opts);
    case "cbet": return genCbet(opts);
    case "facing_cbet": return genFacingCbet(opts);
    case "turn": return genTurn(opts);
    case "river": return genRiver(opts);
    default: return genRFI(opts);
  }
}

function genRFI(opts={}){
  const pos=opts.pos||rnd(["UTG","HJ","CO","BTN","SB"]);
  const stack=opts.stack||rnd([50,75,100,150,200]);
  const cat=opts.cat||rnd(Object.keys(HCATS));
  const hand=rndHand(cat);
  const rng=RFI[pos]||RFI.BTN;
  const freq=rng[hand]||0;
  const shouldOpen=freq>=50;
  const sizing=pos==="BTN"||pos==="SB"?"2.5BB":"3BB";
  const actions=["Fold",`Raise ${sizing}`];
  const correct=shouldOpen?"open":"fold";
  const grade={
    Fold:shouldOpen?(freq>=80?"F":"D"):(freq<=20?"A":"B+"),
    [`Raise ${sizing}`]:shouldOpen?(freq>=80?"A":"B+"):(freq<=20?"F":"D")
  };
  const analysis=ANALYSIS.rfi[cat]||ANALYSIS.rfi.medium_broadway;
  const info=analysis[correct]||analysis.open;
  return{
    id:++_scId,street:"preflop",type:"rfi",
    pos,vpos:rnd(VPOS_AFTER[pos]||["BB"]),
    cards:[...hand.replace(/[so]/g,"")].slice(0,2).map((r,i)=>r+(["h","d","c","s"][i])),
    board:[],pot:1.5,stack,toCall:0,
    situation:`Foldearon hasta vos en ${pos}. ${stack<100?`Stack efectivo ${stack}BB.`:"100BB efectivos."}`,
    actions,correct:shouldOpen?`Raise ${sizing}`:"Fold",grade,
    freqs:{Fold:100-freq,[`Raise ${sizing}`]:freq},
    explanation:`${hand} en ${pos}: freq apertura ${freq}%. ${info.expl}`,
    insight:info.insight,difficulty:freq>80||freq<20?"easy":"hard",
    handDisplay:hand
  };
}

// Pre-generate scenario pool
const SCENARIO_POOL=[];
function buildScenarioPool(){
  const types=["rfi","bb_defend","3bet","cbet","facing_cbet","turn","river"];
  const positions=["UTG","HJ","CO","BTN","SB"];
  const cats=Object.keys(HCATS);
  const stacks=[50,75,100,150,200];
  // Generate ~1200 scenarios
  for(let t of types){
    for(let p of positions){
      for(let c of cats){
        for(let sk of stacks.slice(0,3)){
          try{
            const sc=genScenario({type:t,pos:p,cat:c,stack:sk,vpos:rnd(["BTN","CO","BB"])});
            if(sc) SCENARIO_POOL.push(sc);
          }catch(e){}
        }
      }
    }
  }
  // Shuffle
  for(let i=SCENARIO_POOL.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[SCENARIO_POOL[i],SCENARIO_POOL[j]]=[SCENARIO_POOL[j],SCENARIO_POOL[i]];}
}

buildScenarioPool();

function genQuizQ(mode,posOrScen){
  if(mode==="rfi"){
    const pos=posOrScen||rnd(["UTG","HJ","CO","BTN","SB"]);
    const row=rndInt(0,12),col=rndInt(0,12);
    const hand=handStr(row,col);
    const freq=RFI[pos]?.[hand]||0;
    return{hand,pos,mode:"rfi",freqOpen:freq,freqFold:100-freq,row,col,cmbs:combos(hand)};
  }else{
    const scen=posOrScen||rnd(["vs BTN","vs CO"]);
    const row=rndInt(0,12),col=rndInt(0,12);
    const hand=handStr(row,col);
    const d=BB_DEF[scen]?.[hand]||{c:0,r:0};
    return{hand,scenario:scen,mode:"bb",freqCall:d.c||0,freqRaise:d.r||0,freqFold:100-(d.c||0)-(d.r||0),row,col,cmbs:combos(hand)};
  }
}

function evalQuiz(q,action){
  if(q.mode==="rfi"){
    const open=q.freqOpen>=50;
    const chose=!/fold/i.test(action);
    const ok=open===chose;
    let grade;
    if(ok){grade=q.freqOpen>=85||q.freqOpen<=15?"A":q.freqOpen>=70||q.freqOpen<=30?"B+":"C+";}
    else{grade=q.freqOpen>=85||q.freqOpen<=15?"F":q.freqOpen>=70||q.freqOpen<=30?"D":"C";}
    return{ok,grade,note:(q.freqOpen>35&&q.freqOpen<65)?"Mano mixta — ambas acciones son válidas":null};
  }else{
    const best=q.freqRaise>=40?"raise":q.freqCall>=40?"call":"fold";
    const chose=/raise|3.?bet/i.test(action)?"raise":/call/i.test(action)?"call":"fold";
    const ok=chose===best||(best==="call"&&chose==="raise"&&q.freqRaise>20)||(best==="raise"&&chose==="call"&&q.freqCall>20);
    const grade=ok?(q.freqFold<20?"A":"B+"):(q.freqFold<10?"F":"D");
    return{ok,grade};
  }
}

function pcard(card,sz="md"){
  const dims={sm:[36,50,10,13],md:[48,66,13,17],lg:[60,84,17,22]}[sz];
  const [w,h,fr,fs]=dims;
  if(!card) return `<div class="pcard-back" style="width:${w}px;height:${h}px"></div>`;
  const rank=card.slice(0,-1),suit=card.slice(-1).toLowerCase();
  const isRed=suit==="h"||suit==="d";
  const col=isRed?"#c0392b":"#111";
  return `<div class="pcard" style="width:${w}px;height:${h}px">
    <span class="pcard-rank" style="color:${col};font-size:${fr}px">${rank}</span>
    <span class="pcard-suit" style="color:${col};font-size:${fs}px">${SUIT_SYM[suit]||suit}</span>
  </div>`;
}

function cardSlot(card,slotType,idx,label=""){
  const dims={sm:[36,50],md:[48,66],lg:[60,84]};

    return `<div class="card-slot filled" onclick="openPicker('${slotType}',${idx})" title="Click para cambiar">

  return `<div class="card-slot" onclick="openPicker('${slotType}',${idx})">
    <span class="card-slot-label">${label||"+"}</span>

}

function buildRangeGrid(getColorFn,getTextFn,C=32,selected=null,idPrefix="rg"){
  let html=`<div class="range-grid-wrap"><div class="range-grid">`;
  html+=`<div class="rg-row"><div class="rg-header" style="width:${C}px;height:${C}px"></div>`;
  RANKS.forEach(r=>{html+=`<div class="rg-header" style="width:${C}px;height:${C}px">${r}</div>`;});
  html+=`</div>`;
  for(let row=0;row<13;row++){
    html+=`<div class="rg-row"><div class="rg-header" style="width:${C}px;height:${C}px">${RANKS[row]}</div>`;
    for(let col=0;col<13;col++){
      const h=handStr(row,col);
      const bg=getColorFn(row,col,h);
      const txt=getTextFn(row,col,h);
      const txtCol=row===col?"#f0ead6":row<col?"#a8d5be":"#d5c8a8";
      const isSel=selected&&selected.row===row&&selected.col===col;
      html+=`<div class="rg-cell${isSel?" selected":""}" 
        data-row="${row}" data-col="${col}" data-prefix="${idPrefix}"
        style="width:${C-1}px;height:${C-1}px;background:${bg}">
        <span style="color:${txtCol}">${txt}</span>
      </div>`;
    }
    html+=`</div>`;
  }
  html+=`</div></div>`;
  return html;
}

function buildTabs(){
  const tabs=[["quiz","🎯 Quiz"],["scenarios","📋 Escenarios"],["ranges","♟ Rangos"],["analyzer","🔬 Analizador"]];
  return `<div class="tabs">${tabs.map(([id,lbl])=>`<div class="tab${S.tab===id?" active":""}" onclick="set({tab:'${id}'})">${lbl}</div>`).join("")}</div>`;
}

// ═══════════════════════════════════════════════════════════════
//  QUIZ TAB
// ═══════════════════════════════════════════════════════════════
function buildQuiz(){
  const q=S.qQ,res=S.qResult,st=S.qStats;
  const modeBar=`<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <button class="btn-sm btn-pos${S.qMode==="rfi"?" active":""}" onclick="set({qMode:'rfi',qQ:null,qResult:null})">RFI — Apertura</button>
    <button class="btn-sm btn-pos-green btn-pos${S.qMode==="bb"?" active":""}" onclick="set({qMode:'bb',qQ:null,qResult:null})">BB Defensa</button>
    <div style="flex:1"></div>
    ${st.n>0?`<div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);display:flex;gap:14px">
      <span><span style="color:var(--gold)">${st.correct}</span>/${st.n}</span>
      <span style="color:var(--green)">+${st.streak}🔥</span>
      <span style="color:var(--text3)">${Math.round(st.correct/st.n*100)}%</span>
    </div>`:""}
  </div>
  <div style="display:flex;gap:5px;flex-wrap:wrap">
    ${S.qMode==="rfi"
      ?["UTG","HJ","CO","BTN","SB"].map(p=>`<button class="btn-sm btn-pos${S.qPos===p?" active":""}" onclick="set({qPos:'${p}',qQ:null,qResult:null})">${p}</button>`).join("")
      :["vs BTN","vs CO"].map(sc=>`<button class="btn-sm btn-pos-green btn-pos${S.qScen===sc?" active":""}" onclick="set({qScen:'${sc}',qQ:null,qResult:null})">${sc}</button>`).join("")
    }
  </div>`;

  if(!q){
    return `<div style="padding:24px;display:flex;flex-direction:column;gap:14px">
      ${modeBar}
      <div style="display:flex;flex-direction:column;align-items:center;gap:20px;margin:40px 0">
        <div style="font-family:'Playfair Display',serif;font-size:28px;color:var(--gold);text-align:center">Quiz de Rangos GTO</div>
        <div style="font-size:13px;color:var(--text3);text-align:center;max-width:360px;line-height:1.75">
          Te mostramos una mano y posición. Decidís la acción correcta según los rangos de solvers.
          <br><span style="color:var(--gold)">+1000 combinaciones únicas.</span> Totalmente offline.
        </div>
        <button class="btn-primary" onclick="startQuiz()">Empezar Quiz ♠</button>
      </div>
    </div>`;
  }

  const isPair=q.row===q.col,isSuited=q.row<q.col;
  const handLbl=q.hand;

  let answerBtns="";
  if(q.mode==="rfi"){
    answerBtns=`<button class="btn-call" onclick="answerQuiz('open')">📈 Abrir / Raise</button>
      <button class="btn-fold" onclick="answerQuiz('fold')">❌ Fold</button>`;
  }else{
    answerBtns=`<button class="btn-raise" onclick="answerQuiz('raise')">⬆ 3-Bet</button>
      <button class="btn-call" onclick="answerQuiz('call')">📞 Call</button>
      <button class="btn-fold" onclick="answerQuiz('fold')">❌ Fold</button>`;
  }

  let resultSection="";
  if(res){
    const gc=GRADE_COL[res.grade]||"#8a9e8a";
    const freqs=q.mode==="rfi"
      ?[["Abrir",q.freqOpen,"var(--green)"],["Fold",q.freqFold,"var(--red)"]]
      :[["3-Bet",q.freqRaise,"var(--gold)"],["Call",q.freqCall,"var(--blue)"],["Fold",q.freqFold,"var(--red)"]];
    resultSection=`<div class="anim-pop" style="background:var(--bg2);border:1px solid ${res.ok?"rgba(61,186,116,.35)":"rgba(224,82,82,.35)"};border-radius:12px;padding:20px;max-width:400px;width:100%">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
        ${gradeBadge(res.grade,58)}
        <div>
          <div style="font-size:16px;font-weight:700;color:${res.ok?"var(--green)":"var(--red)"}">${res.ok?"✓ Correcto":"✗ Incorrecto"}</div>
          ${res.note?`<div style="font-size:11px;color:var(--text3);margin-top:3px">${res.note}</div>`:""}
        </div>
      </div>
      <div style="margin-bottom:14px">${freqs.map(([a,p,c])=>freqBar(a,p,c)).join("")}</div>
      <button class="btn-primary" onclick="startQuiz()" style="width:100%">Siguiente mano →</button>
    </div>`;
  }

  return `<div style="padding:24px;display:flex;flex-direction:column;gap:14px;align-items:center">
    <div style="width:100%;max-width:500px;display:flex;flex-direction:column;gap:14px">
      ${modeBar}
    </div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:28px;
      display:flex;flex-direction:column;align-items:center;gap:16px;width:100%;max-width:400px;margin-top:4px">
      <div style="font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text3);font-family:'IBM Plex Mono',monospace">
        ${q.mode==="rfi"?`RFI — ${q.pos}`:`BB vs ${q.scenario}`}
      </div>
      <div style="font-size:58px;font-weight:700;color:var(--gold);font-family:'IBM Plex Mono',monospace;letter-spacing:4px">${handLbl}</div>
      <div style="font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace">${q.cmbs} combinaciones posibles</div>
      ${!res?`<div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">${answerBtns}</div>`:""}
    </div>
    ${resultSection}
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  SCENARIOS TAB
// ═══════════════════════════════════════════════════════════════
function getFilteredScenarios(){
  let pool=S.scPool;
  if(S.scFilter!=="all") pool=pool.filter(s=>s.street===S.scFilter);
  if(S.scDiff!=="all") pool=pool.filter(s=>s.difficulty===S.scDiff);
  return pool.length?pool:S.scPool;
}

function buildScenarios(){
  const pool=getFilteredScenarios();
  const sc=pool[S.scIdx%pool.length];
  const res=S.scResult;

  const filters=`<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
    ${["all","preflop","flop","turn","river"].map(f=>`<button class="btn-sm btn-pos${S.scFilter===f?" active":""}" onclick="set({scFilter:'${f}',scIdx:0,scResult:null})">${f==="all"?"Todos":f.charAt(0).toUpperCase()+f.slice(1)}</button>`).join("")}
    <div style="flex:1"></div>
    <span style="font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace">
      ${(S.scIdx%pool.length)+1} / ${pool.length}
    </span>
  </div>`;

  const board=sc.board||[];
  const boardHtml=board.length>0?`<div style="display:flex;gap:5px">${board.map(c=>pcard(c,"sm")).join("")}</div>`:"";

  let actionBtns="";
  if(!res){
    actionBtns=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">
      ${sc.actions.map(a=>{
        const isFold=/fold/i.test(a);
        const isCall=/call|check/i.test(a);
        const cls=isFold?"btn-fold":isCall?"btn-call":"btn-raise";
        return `<button class="${cls}" onclick="answerScenario(decodeURIComponent('${encodeURIComponent(a)}'  ))">${a}</button>`;
      }).join("")}
    </div>`;
  }

  let resultHtml="";
  if(res){
    const gc=GRADE_COL[res.grade]||"#8a9e8a";
    const isGood=["A","A+","B+","B"].includes(res.grade);
    resultHtml=`<div class="anim-up" style="background:var(--bg2);border:1px solid ${isGood?"rgba(61,186,116,.3)":"rgba(224,82,82,.25)"};border-radius:12px;padding:18px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        ${gradeBadge(res.grade,50)}
        <div>
          <div style="font-size:13px;font-weight:700;color:var(--text)">Jugaste: <span style="color:${gc}">${res.action}</span></div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">GTO óptimo: ${sc.correct}</div>
        </div>
      </div>
      <div style="margin-bottom:12px">${Object.entries(sc.freqs).map(([a,p])=>{
        const c=/fold/i.test(a)?"var(--red)":/call|check/i.test(a)?"var(--green)":"var(--gold)";
        return freqBar(a,p,c);
      }).join("")}</div>
      <div class="insight-box insight-analysis" style="margin-bottom:10px">
        <div class="insight-title" style="color:rgba(201,168,76,.6)">ANÁLISIS</div>
        <div class="insight-body">${sc.explanation}</div>
      </div>
      <div class="insight-box insight-key" style="margin-bottom:14px">
        <div class="insight-title" style="color:rgba(61,186,116,.6)">LECCIÓN CLAVE</div>
        <div class="insight-body">${sc.insight}</div>
      </div>
      <button class="btn-primary" onclick="nextScenario()">Siguiente Escenario →</button>
    </div>`;
  }

  const handDisplay=sc.handDisplay||"??";

  return `<div style="padding:20px;display:flex;flex-direction:column;gap:14px">
    ${filters}
    <div class="card card-gold" style="display:flex;flex-direction:column;gap:14px">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        ${streetPill(sc.street)}
        <span style="font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace">${sc.pos} vs ${sc.vpos}</span>
        <span style="font-size:11px;font-weight:700;color:var(--gold);font-family:'IBM Plex Mono',monospace;margin-left:auto">${handDisplay}</span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        ${sc.cards.map(c=>pcard(c,"md")).join("")}
        ${board.length>0?`<div style="width:1px;height:56px;background:var(--border);margin:0 4px"></div>`:""} 
        ${boardHtml}
      </div>
      <div style="background:var(--bg1);border-radius:8px;padding:12px">
        <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:6px">SITUACIÓN</div>
        <div style="font-size:13px;color:var(--text);line-height:1.75">${sc.situation}</div>
        ${sc.toCall>0?`<div style="font-size:11px;color:var(--gold);font-family:'IBM Plex Mono',monospace;margin-top:6px">→ Te cuesta ${sc.toCall} BB llamar | Bote: ${sc.pot} BB</div>`:`<div style="font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-top:6px">Bote: ${sc.pot} BB | Stack efectivo: ${sc.stack} BB</div>`}
      </div>
      ${actionBtns}
    </div>
    ${resultHtml}
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  RANGES TAB
// ═══════════════════════════════════════════════════════════════
function buildRanges(){
  const sel=S.rmSel;
  const C=33;

  function getColor(row,col,h){
    if(S.rmMode==="rfi") return rfiColor(RFI[S.rmPos]?.[h]||0);
    const d=BB_DEF[S.rmScen]?.[h]||{c:0,r:0};
    return bbColor(d.c||0,d.r||0);
  }
  function getText(row,col,h){
    const isPair=row===col,isSuit=row<col;
    return isPair?h:isSuit?`${RANKS[row]}${RANKS[col]}s`:`${RANKS[col]}${RANKS[row]}o`;
  }

  let totalC=0;
  for(let i=0;i<13;i++)for(let j=0;j<13;j++){
    const h=handStr(i,j);
    const v=S.rmMode==="rfi"?(RFI[S.rmPos]?.[h]||0)/100:((BB_DEF[S.rmScen]?.[h]?.c||0)+(BB_DEF[S.rmScen]?.[h]?.r||0))/100;
    totalC+=combos(h)*v;
  }

  let selPanel="<div style='color:var(--text3);font-size:13px;text-align:center;padding:40px 0'>Haz clic en cualquier mano para ver el análisis del rango.</div>";
  if(sel){
    const cell=sel.cell;
    const freqs=cell.type==="rfi"
      ?[["Abrir",cell.freq,"var(--green)"],["Fold",100-cell.freq,"var(--red)"]]
      :[["3-Bet",cell.raise,"var(--gold)"],["Call",cell.call,"var(--blue)"],["Fold",cell.fold,"var(--red)"]];
    let tip="";
    if(cell.type==="rfi"){
      if(cell.freq>=90) tip=`Apertura estándar al 100% desde ${S.rmPos}. Mano demasiado fuerte para fold.`;
      else if(cell.freq>=65) tip=`Apertura frecuente (~${cell.freq}%). Parte del rango core de ${S.rmPos}.`;
      else if(cell.freq>=35) tip=`Mano mixta (~${cell.freq}%). GTO abre y foldea en diferentes frecuencias.`;
      else if(cell.freq>0) tip=`Apertura poco frecuente (${cell.freq}%). En el rango de balance, no es obligatoria.`;
      else tip=`Fold desde ${S.rmPos}. No tiene equity suficiente para abrir en esta posición.`;
    }else{
      const best=cell.raise>=40?"3-bet":cell.call>=40?"call":"fold";
      if(best==="3-bet") tip=`3-bet frecuente (${cell.raise}%) — mano fuerte o bloqueador de Ace.`;
      else if(best==="call") tip=`Defensa llamando (${cell.call}%). Buena jugabilidad postflop.`;
      else tip=`Fold frecuente (${cell.fold}%). No alcanza el umbral de defensa.`;
    }
    selPanel=`<div class="anim-pop">
      <div style="display:flex;gap:10px;align-items:baseline;margin-bottom:12px">
        <span style="font-size:28px;font-weight:800;color:var(--gold);font-family:'IBM Plex Mono',monospace">${cell.hand}</span>
        <span style="font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace">${combos(cell.hand)} combos</span>
      </div>
      ${freqs.map(([a,p,c])=>freqBar(a,p,c)).join("")}
      <div class="insight-box insight-analysis" style="margin-top:10px">
        <div class="insight-title" style="color:rgba(201,168,76,.6)">ANÁLISIS GTO</div>
        <div class="insight-body">${tip}</div>
      </div>
    </div>`;
  }

  const legend=S.rmMode==="rfi"
    ?[[100,"100%"],[70,"70%"],[50,"50%"],[30,"30%"],[10,"10%"],[0,"Fold"]].map(([f,l])=>`<div style="display:flex;align-items:center;gap:5px"><div class="legend-dot" style="background:${rfiColor(f)}"></div><span style="font-size:9px;color:var(--text3);font-family:'IBM Plex Mono',monospace">${l}</span></div>`).join("")
    :[[0,80,"3-bet"],[0,30,"3-bet mix"],[70,0,"Call"],[30,0,"Call mix"],[0,0,"Fold"]].map(([c,r,l])=>`<div style="display:flex;align-items:center;gap:5px"><div class="legend-dot" style="background:${bbColor(c,r)}"></div><span style="font-size:9px;color:var(--text3);font-family:'IBM Plex Mono',monospace">${l}</span></div>`).join("");

  return `<div style="padding:20px;display:flex;gap:20px;flex-wrap:wrap">
    <div style="flex:1;min-width:280px;display:flex;flex-direction:column;gap:12px">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <button class="btn-sm btn-pos${S.rmMode==="rfi"?" active":""}" onclick="set({rmMode:'rfi',rmSel:null})">RFI — Apertura</button>
        <button class="btn-sm btn-pos-green btn-pos${S.rmMode==="bb"?" active":""}" onclick="set({rmMode:'bb',rmSel:null})">BB Defensa</button>
        <div style="flex:1"></div>
        <span style="font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace">
          <span style="color:var(--gold)">${Math.round(totalC)}</span> combos · 
          <span style="color:var(--gold)">${(totalC/1326*100).toFixed(1)}%</span>
        </span>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        ${S.rmMode==="rfi"
          ?["UTG","HJ","CO","BTN","SB"].map(p=>`<button class="btn-sm btn-pos${S.rmPos===p?" active":""}" onclick="set({rmPos:'${p}',rmSel:null})">${p}</button>`).join("")
          :["vs BTN","vs CO"].map(sc=>`<button class="btn-sm btn-pos-green btn-pos${S.rmScen===sc?" active":""}" onclick="setScen('${sc}')">${sc}</button>`).join("")
        }
      </div>
      ${buildRangeGrid(getColor,getText,C,S.rmSel,"rm")}
      <div style="display:flex;gap:10px;flex-wrap:wrap">${legend}</div>
      <div style="font-size:10px;color:rgba(201,168,76,.4);font-family:'IBM Plex Mono',monospace">↑ Click para análisis detallado</div>
    </div>
    <div style="width:280px;flex-shrink:0;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:18px">
      <div style="font-family:'Playfair Display',serif;font-size:16px;color:var(--gold);margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border2)">
        ${S.rmMode==="rfi"?`Rango RFI — ${S.rmPos}`:`BB Defensa — ${S.rmScen}`}
      </div>
      ${selPanel}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  ANALYZER TAB (GTO WIZARD STYLE)
// ═══════════════════════════════════════════════════════════════
function buildAnalyzer(){
  const board=S.aBoardCards.filter(Boolean);
  const heroCards=S.aHeroCards;
  const hasFlop=board.length>=3;
  const hasTurn=board.length>=4;
  const hasRiver=board.length>=5;
  const tex=hasFlop?boardTexture(board.slice(0,3)):null;
  const usedCards=new Set([...heroCards,...board].filter(Boolean).map(c=>c));

  // Villain range based on their position
  const vilRng=RFI[S.aVilPos]||RFI.BTN;

  // Range grid: show villain's range with board interaction
  function getRangeColor(row,col,h){
    const freq=vilRng[h]||0;
    if(freq===0) return "#060c08";
    if(!hasFlop) return rfiColor(freq);
    const s=handBoardStrength(h,board.slice(0,Math.min(board.length,5)));
    return strengthToRangeColor(s,freq>0);
  }
  function getRangeText(row,col,h){
    const isPair=row===col,isSuit=row<col;
    return isPair?h:isSuit?`${RANKS[row]}${RANKS[col]}s`:`${RANKS[col]}${RANKS[row]}o`;
  }

  // Board analysis stats
  let continuingCount=0,totalRangeCount=0;
  let strongCount=0,madeCount=0,drawCount=0,airCount=0;
  if(hasFlop){
    for(let i=0;i<13;i++)for(let j=0;j<13;j++){
      const h=handStr(i,j);
      const freq=vilRng[h]||0;
      if(freq>0){
        const combCount=combos(h)*(freq/100);
        totalRangeCount+=combCount;
        const s=handBoardStrength(h,board.slice(0,Math.min(board.length,5)));
        if(s>=7){strongCount+=combCount;continuingCount+=combCount;}
        else if(s>=5){madeCount+=combCount;continuingCount+=combCount;}
        else if(s>=3){drawCount+=combCount;continuingCount+=combCount;}
        else{airCount+=combCount;}
      }
    }
  }

  const pct=totalRangeCount>0?Math.round(continuingCount/totalRangeCount*100):0;
  const boardDesc=tex?textureLabel(tex):"";

  // Street buttons for board input
  const flopSlots=[0,1,2].map(i=>cardSlot(S.aBoardCards[i],"board",i,i===0?"F":i===1?"L":i===2?"O":"")).join("");
  const turnSlot=cardSlot(S.aBoardCards[3],"board",3,"T");
  const riverSlot=cardSlot(S.aBoardCards[4],"board",4,"R");

  // Hero cards
  const heroSlots=[0,1].map(i=>cardSlot(S.aHeroCards[i],"hero",i,i===0?"A":"B")).join("");

  // Stats bar
  const statsBar=hasFlop?`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">
    <div class="stat-box"><div class="stat-val" style="color:#3dba74;font-size:16px">${Math.round(strongCount)}</div><div class="stat-lbl">Fuertes</div></div>
    <div class="stat-box"><div class="stat-val" style="color:#8bc34a;font-size:16px">${Math.round(madeCount)}</div><div class="stat-lbl">Made</div></div>
    <div class="stat-box"><div class="stat-val" style="color:#c9a84c;font-size:16px">${Math.round(drawCount)}</div><div class="stat-lbl">Draws</div></div>
    <div class="stat-box"><div class="stat-val" style="color:#e05252;font-size:16px">${Math.round(airCount)}</div><div class="stat-lbl">Air</div></div>
  </div>`:"";

  // Legend for board interaction
  const boardLegend=hasFlop?`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px">
    ${[["#0f5a28","Sets+"],["#1a7a38","Top pair"],["#1e5a30","Par"],["#3d5410","Draw"],["#5a3a0a","Backdoor"],["#09130b","Air"]].map(([c,l])=>`<div style="display:flex;align-items:center;gap:5px"><div class="legend-dot" style="background:${c}"></div><span style="font-size:9px;color:var(--text3);font-family:'IBM Plex Mono',monospace">${l}</span></div>`).join("")}
  </div>`:""

  // Modal de card picker
  const pickerModal=S.aPickingSlot!==null?buildCardPicker(usedCards):"";

  return `<div style="padding:20px;display:flex;gap:20px;flex-wrap:wrap">
    <!-- LEFT PANEL -->
    <div style="width:300px;flex-shrink:0;display:flex;flex-direction:column;gap:14px">
      <div class="card card-gold">
        <div class="section-title" style="font-size:16px;margin-bottom:10px">Configurar Mano</div>
        
        <div style="margin-bottom:14px">
          <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:8px">POSICIONES</div>
          <div style="display:flex;gap:10px;align-items:center">
            <div>
              <div style="font-size:9px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:4px">HERO</div>
              <div style="display:flex;gap:4px;flex-wrap:wrap">
                ${["UTG","HJ","CO","BTN","SB"].map(p=>`<button class="btn-sm btn-pos${S.aHeroPos===p?" active":""}" onclick="set({aHeroPos:'${p}'})">${p}</button>`).join("")}
              </div>
            </div>
            <div>

function buildCardPicker(usedCards){
  const slot=S.aPickingSlot;
  let rows="";
  const suits=[["s","♠","#f0ead6"],["h","♥","#e05252"],["d","♦","#e05252"],["c","♣","#a0c8a0"]];
  for(const [suit,sym,col] of suits){
    rows+=`<div style="display:contents">`;
    for(const rank of RANKS){
      const card=rank+suit;
      const isUsed=usedCards.has(card);
      rows+=`<div class="cp-cell ${isUsed?"used":""}" 
        style="color:${col};background:rgba(255,255,255,${isUsed?".03":".08"})"
        onclick="${isUsed?"":"pickCard('"+card+"')"}">${rank}<br>${sym}</div>`;
    }
    rows+=`</div>`;
  }
  return `<div class="modal-overlay" onclick="closePicker()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">Seleccioná una carta</div>
      <div class="card-picker-grid">${rows}</div>
      <button class="btn-secondary" onclick="closePicker()">Cancelar</button>
    </div>
  </div>`;
}

function bindEvents(){
  // Range grid clicks
  document.querySelectorAll(".rg-cell").forEach(cell=>{
    cell.addEventListener("click",()=>{
      const row=parseInt(cell.dataset.row);
      const col=parseInt(cell.dataset.col);
      const prefix=cell.dataset.prefix;
      const h=handStr(row,col);
      if(prefix==="rm"){
        let cellData;
        if(S.rmMode==="rfi") cellData={hand:h,freq:RFI[S.rmPos]?.[h]||0,type:"rfi"};
        else{const d=BB_DEF[S.rmScen]?.[h]||{c:0,r:0};cellData={hand:h,call:d.c||0,raise:d.r||0,fold:100-(d.c||0)-(d.r||0),type:"bb"};}
        set({rmSel:{row,col,cell:cellData}});
      }
    });
  });
}

function startQuiz(){
  const q=genQuizQ(S.qMode,S.qMode==="rfi"?S.qPos:S.qScen);
  set({qQ:q,qResult:null});
}

function answerQuiz(action){
  if(!S.qQ||S.qResult) return;
  const res=evalQuiz(S.qQ,action);
  const newStreak=res.ok?S.qStats.streak+1:0;
  set({
    qResult:res,
    qStats:{
      n:S.qStats.n+1,
      correct:S.qStats.correct+(res.ok?1:0),
      streak:newStreak,
      maxStreak:Math.max(S.qStats.maxStreak,newStreak),
      grades:Object.assign({},S.qStats.grades,{[res.grade]:(S.qStats.grades[res.grade]||0)+1})
    }
  });
}

function answerScenario(action){
  const pool=getFilteredScenarios();
  const sc=pool[S.scIdx%pool.length];
  let grade=sc.grade?.[action]||"C";
  // Fuzzy match for action
  if(!sc.grade?.[action]){
    for(const [k,g] of Object.entries(sc.grade||{})){
      if(action.toLowerCase().includes(k.toLowerCase())||k.toLowerCase().includes(action.toLowerCase())){grade=g;break;}
    }
    if(sc.correct&&action.toLowerCase().includes(sc.correct.toLowerCase())) grade="A";
  }
  set({scResult:{grade,action}});
}

function nextScenario(){
  set({scIdx:S.scIdx+1,scResult:null});
}

function setScen(sc){
  set({rmScen:sc,rmSel:null});
}

function openPicker(type,idx){
  set({aPickingSlot:{type,idx}});
}

function closePicker(){
  set({aPickingSlot:null});
}

function pickCard(card){
  const slot=S.aPickingSlot;
  if(!slot) return;
  if(slot.type==="hero"){
    const cards=[...S.aHeroCards];
    cards[slot.idx]=card;
    set({aHeroCards:cards,aPickingSlot:null});
  }else{
    const cards=[...S.aBoardCards];
    cards[slot.idx]=card;
    set({aBoardCards:cards,aPickingSlot:null});
  }
}

function resetAnalyzer(){
  set({aHeroCards:[null,null],aBoardCards:[null,null,null,null,null],aPickingSlot:null});
}

  return `<div class="pcard" style="width:${w}px;height:${h}px">

function gradeHTML(grade, size){

}

function spHTML(street){

function rfiColorV3(f){
  if(!f||f<=0) return"#030705";
  if(f>=90)return"#0d5224";if(f>=70)return"#0f6a2e";
  if(f>=50)return"#284a0c";if(f>=30)return"#5c3010";
  if(f>=10)return"#6a2010";return"#321808";
}
function bbColorV3(c,r){c=c||0;r=r||0;
  if(r>=70)return"#0d5224";if(r>=35)return"#0f6a2e";if(r>=10)return"#174a38";
  if(c>=70)return"#183060";if(c>=40)return"#142450";if(c>=10)return"#101d3c";

function buildGridFn(getColor, getText, C, selObj, idp){
  C=C||32;
  let h=`<div class="rg-wrap"><div class="rg-grid">`;
  h+=`<div class="rg-row"><div class="rg-head-cell" style="width:${C}px;height:${C}px"></div>`;
  RANKS.forEach(r=>{h+=`<div class="rg-head-cell" style="width:${C}px;height:${C}px">${r}</div>`;});
  h+=`</div>`;
  for(let row=0;row<13;row++){
    h+=`<div class="rg-row"><div class="rg-head-cell" style="width:${C}px;height:${C}px">${RANKS[row]}</div>`;
    for(let col=0;col<13;col++){
      const hand=handStr(row,col);
      const bg=getColor(row,col,hand);
      const txt=getText(row,col,hand);
      const isPair=row===col,isSuit=row<col;
      const txtCol=isPair?"#e8e0cc":isSuit?"#9ccfb8":"#c8b890";
      const isSel=selObj&&selObj.row===row&&selObj.col===col;
      h+=`<div class="rg-cell${isSel?" sel":""}" data-row="${row}" data-col="${col}" data-pfx="${idp||''}"
        style="width:${C-1}px;height:${C-1}px;background:${bg}">
        <span style="color:${txtCol}">${txt}</span></div>`;
    }
    h+=`</div>`;
  }
  h+=`</div></div>`;
  return h;
}

        <div class="ib ib-gold" style="margin-bottom:10px">
          <div class="ib-title" style="color:rgba(200,167,74,.7)">ANÁLISIS</div>

        <button class="btn-primary" onclick="nextScenario()">Siguiente Escenario →</button>
      </div>

  }

  return `<div class="page anim-in">
    ${filters}
    <div style="display:flex;flex-direction:column;gap:14px;max-width:660px">
      <div class="panel panel-gold">
        <div class="panel-body">

            <span style="flex:1"></span>

          </div>

              ${boardHTML}`:""}

}

// ── RANGES ──────────────────────────────────────────────────────
function renderRanges(){
  const sel=S.rmSel;
  function getColor(row,col,h){
    if(S.rmMode==="rfi") return rfiColorV3(RFI[S.rmPos]?.[h]||0);
    const d=BB_DEF[S.rmScen]?.[h]||{c:0,r:0};
    return bbColorV3(d.c||0,d.r||0);
  }
  function getText(row,col,h){
    const p=row===col,s=row<col;
    return p?h:s?`${RANKS[row]}${RANKS[col]}s`:`${RANKS[col]}${RANKS[row]}o`;
  }
  let tc=0;
  for(let i=0;i<13;i++)for(let j=0;j<13;j++){
    const h=handStr(i,j);
    const v=S.rmMode==="rfi"?(RFI[S.rmPos]?.[h]||0)/100:((BB_DEF[S.rmScen]?.[h]?.c||0)+(BB_DEF[S.rmScen]?.[h]?.r||0))/100;
    tc+=combos(h)*v;
  }

  let selPanel=`<div style="display:flex;align-items:center;justify-content:center;height:200px">
    <div style="text-align:center;color:var(--text3)">
      <div style="font-size:32px;margin-bottom:8px;opacity:.3">↑</div>
      <div style="font-size:12px;line-height:1.6">Haz clic en cualquier<br>mano para ver el análisis</div>
    </div>
  </div>`;

  if(sel){
    const c=sel.cell;
    const freqs=c.type==="rfi"
      ?[["Abrir",c.freq,"var(--green2)"],["Fold",100-c.freq,"var(--red2)"]]
      :[["3-Bet",c.raise,"var(--gold2)"],["Call",c.call,"var(--blue)"],["Fold",c.fold,"var(--red2)"]];
    let tip="";
    if(c.type==="rfi"){
      if(c.freq>=90) tip=`Apertura al 100% desde ${S.rmPos}. Mano premium, fold es un error grave.`;
      else if(c.freq>=65) tip=`Apertura frecuente (~${c.freq}%). Parte del rango core de ${S.rmPos}.`;
      else if(c.freq>=35) tip=`Mano mixta (${c.freq}%). GTO mezcla apertura y fold. No hay respuesta única.`;
      else if(c.freq>0) tip=`Apertura marginal (${c.freq}%). En rango de balance, no es obligatoria.`;
      else tip=`Fold desde ${S.rmPos}. No tiene equity suficiente para abrir en esta posición.`;
    } else {
      const best=c.raise>=40?"3-bet":c.call>=40?"call":"fold";
      if(best==="3-bet") tip=`3-bet frecuente (${c.raise}%). Mano fuerte o con buen bloqueador de Ace.`;
      else if(best==="call") tip=`Defensa principalmente llamando (${c.call}%). Buena playability postflop.`;
      else tip=`Fold frecuente (${c.fold}%). No alcanza el umbral de defensa ${S.rmScen}.`;
    }
    selPanel=`<div class="anim-pop">
      <div style="display:flex;gap:10px;align-items:baseline;margin-bottom:14px">
        <span style="font-size:32px;font-weight:700;color:var(--gold);font-family:'IBM Plex Mono',monospace">${c.hand}</span>
        <span style="font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace">${combos(c.hand)} combos</span>
      </div>
      ${freqs.map(([a,p,col])=>fbarHTML(a,p,col)).join("")}
      <div class="divider"></div>
      <div class="ib ib-gold">
        <div class="ib-title" style="color:rgba(200,167,74,.7)">ANÁLISIS GTO</div>
        <div class="ib-body">${tip}</div>
      </div>
    </div>`;
  }

  const legend=S.rmMode==="rfi"
    ?[[100,"100%"],[70,"70%"],[50,"50%"],[30,"30%"],[10,"10%"],[0,"Fold"]].map(([f,l])=>`<div style="display:flex;align-items:center;gap:5px"><div class="legend-dot" style="background:${rfiColorV3(f)}"></div><span style="font-size:9px;color:var(--text3);font-family:'IBM Plex Mono',monospace">${l}</span></div>`).join("")
    :[[0,80,"3-bet"],[0,30,"Mix"],[70,0,"Call"],[30,0,"Call mix"],[0,0,"Fold"]].map(([c,r,l])=>`<div style="display:flex;align-items:center;gap:5px"><div class="legend-dot" style="background:${bbColorV3(c,r)}"></div><span style="font-size:9px;color:var(--text3);font-family:'IBM Plex Mono',monospace">${l}</span></div>`).join("");

  return `<div class="page anim-in">
    <div style="display:flex;gap:20px;flex-wrap:wrap">
      <div style="flex:1;min-width:300px;display:flex;flex-direction:column;gap:12px">
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <div class="pill-group">
            <div class="pill${S.rmMode==="rfi"?" active":""}" onclick="set({rmMode:'rfi',rmSel:null})">RFI Apertura</div>
            <div class="pill pill-green${S.rmMode==="bb"?" active":""}" onclick="set({rmMode:'bb',rmSel:null})">BB Defensa</div>
          </div>
          <div style="flex:1"></div>
          <span style="font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace">
            <span style="color:var(--gold)">${Math.round(tc)}</span> combos · 
            <span style="color:var(--gold)">${(tc/1326*100).toFixed(1)}%</span>
          </span>
        </div>
        <div class="pos-chips">
          ${S.rmMode==="rfi"
            ?["UTG","HJ","CO","BTN","SB"].map(p=>`<div class="pos-chip${S.rmPos===p?" active-gold":""}" onclick="set({rmPos:'${p}',rmSel:null})">${p}</div>`).join("")
            :["vs BTN","vs CO"].map(sc=>`<div class="pos-chip${S.rmScen===sc?" active-green":""}" onclick="set({rmScen:'${sc}',rmSel:null})">${sc}</div>`).join("")
          }
        </div>
        ${buildGridFn(getColor,getText,33,S.rmSel,"rm")}
        <div style="display:flex;gap:10px;flex-wrap:wrap">${legend}</div>
      </div>
      <div style="width:260px;flex-shrink:0">
        <div class="panel panel-gold" style="position:sticky;top:120px">
          <div class="panel-header">
            <span class="panel-title" style="font-size:16px">${S.rmMode==="rfi"?`RFI — ${S.rmPos}`:`BB — ${S.rmScen}`}</span>
          </div>
          <div class="panel-body">${selPanel}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function renderAnalyzer(){
  const board=S.aBoardCards.filter(Boolean);
  const heroCards=S.aHeroCards;
  const hasFlop=board.length>=3;
  const used=new Set([...heroCards,...board].filter(Boolean));
  const vilRng=RFI[S.aVilPos]||RFI.BTN;
  const tex=hasFlop?boardTexture(board.slice(0,3)):null;

  function getColor(row,col,h){
    const freq=vilRng[h]||0;
    if(freq===0) return"#020404";
    if(!hasFlop) return rfiColorV3(freq);
    const s=handBoardStrength(h,board);
    return strengthToRangeColor(s,freq>0);
  }
  function getText(row,col,h){
    const p=row===col,s=row<col;
    return p?h:s?`${RANKS[row]}${RANKS[col]}s`:`${RANKS[col]}${RANKS[row]}o`;
  }

  let strong=0,made=0,draws=0,air=0,total=0;
  if(hasFlop){
    for(let i=0;i<13;i++)for(let j=0;j<13;j++){
      const h=handStr(i,j),f=vilRng[h]||0;
      if(f>0){const n=combos(h)*(f/100);total+=n;const s=handBoardStrength(h,board);
        if(s>=7)strong+=n;else if(s>=5)made+=n;else if(s>=3)draws+=n;else air+=n;}

  const boardStreet=board.length===0?"PREFLOP":board.length<3?"INCOMPLETO":board.length===3?"FLOP":board.length===4?"TURN":"RIVER";

    texHTML=`<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:8px">${chips.join("")}</div>`;

    <!-- LEFT CONTROLS -->
    <div style="width:280px;flex-shrink:0;display:flex;flex-direction:column;gap:14px">

          </div>
          <div>
            <div class="slabel">VILLAIN — POSICIÓN</div>
            <div class="pos-chips">${["UTG","HJ","CO","BTN","BB"].map(p=>`<div class="pos-chip${S.aVilPos===p?" active-gold":""}" onclick="set({aVilPos:'${p}'})">${p}</div>`).join("")}</div>
          </div>
          <div>
            <div class="slabel">CARTAS DEL HERO</div>
            <div style="display:flex;gap:8px">${[0,1].map(i=>slotHTML(S.aHeroCards[i],"hero",i,i===0?"A":"B")).join("")}</div>
          </div>
          <div>
            <div class="slabel">TABLERO <span style="color:var(--gold)">${boardStreet}</span></div>
            <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">
              ${[0,1,2].map(i=>slotHTML(S.aBoardCards[i],"board",i,["F","L","O"][i])).join("")}
              <div style="width:1px;height:40px;background:var(--border2)"></div>
              ${slotHTML(S.aBoardCards[3],"board",3,"T")}
              <div style="width:1px;height:40px;background:var(--border2)"></div>
              ${slotHTML(S.aBoardCards[4],"board",4,"R")}
            </div>
            ${texHTML}
          </div>
          <button class="btn-ghost" onclick="resetAnalyzer()" style="width:100%">↺ Resetear mano</button>

      ${hasFlop?`<div class="panel">

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">

        <div style="font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold)">Rango del Villain <span style="color:var(--text3);font-size:16px">(${S.aVilPos})</span></div>
        ${hasFlop?`<span style="font-size:12px;color:var(--green2);font-family:'IBM Plex Mono',monospace">${Math.round((strong+made+draws)/total*100)}% continúa</span>`:""}

        ${!hasFlop

      <div style="display:flex;gap:10px;flex-wrap:wrap">
        ${hasFlop
          ?[["#0d5224","Sets/Quads"],["#0f6a2e","TPTK"],["#174a38","Par medio"],["#284a0c","Draw"],["#5c3010","Backdoor"],["#020404","Air"]].map(([c,l])=>`<div style="display:flex;align-items:center;gap:5px"><div class="legend-dot" style="background:${c}"></div><span style="font-size:9px;color:var(--text3);font-family:'IBM Plex Mono',monospace">${l}</span></div>`).join("")

        }

  </div>${modal}`;

// ── EV CALCULATOR ────────────────────────────────────────────────
function renderEV(){
  const ev=S.ev||{pot:10,bet:5,equity:45,foldEq:35};

  const potBB=parseFloat(ev.pot)||10;
  const betBB=parseFloat(ev.bet)||5;
  const equity=(parseFloat(ev.equity)||45)/100;
  const foldEq=(parseFloat(ev.foldEq)||35)/100;

  // EV of bet
  const callFreq=1-foldEq;
  const evBet=foldEq*potBB + callFreq*(equity*(potBB+betBB) - (1-equity)*betBB);
  // EV of check (simplified: equity * pot, no more betting)
  const evCheck=equity*potBB;
  const evDiff=evBet-evCheck;

  // Break-even fold %
  // evBet>0: foldEq*pot + callFreq*(eq*(pot+bet)-(1-eq)*bet) > 0
  const breakEvenFold=(betBB - equity*(potBB+betBB)) / (potBB - equity*(potBB+betBB) + (1-equity)*betBB);
  const beFoldPct=Math.max(0,Math.min(100,breakEvenFold*100));

  // Minimum equity when called to break even vs fold
  // evBet=evCheck when: foldEq*pot + callFreq*(eq*(pot+bet)-(1-eq)*bet) = eq*pot
  // Solving: minimum equity needed for bet to be +EV vs checking
  const minEq=(foldEq*potBB) / (callFreq*(potBB+2*betBB));
  const minEqPct=Math.max(0,Math.min(100,minEq*100));

  // Pot odds
  const potOdds=betBB/(potBB+betBB);
  const breakEvenEq=potOdds*100;

  // SPR
  const stack=parseFloat(ev.stack)||100;
  const spr=stack/(potBB);

  const evColor=evBet>evCheck?"var(--green2)":"var(--red2)";
  const diffColor=evDiff>0?"var(--green2)":"var(--red2)";
  const diffSign=evDiff>0?"+":"";

  function numInput(key,label,val,min,max,step,unit){
    return `<div class="ev-input-group">
      <div class="ev-label">${label} ${unit?`<span style="color:var(--gold);font-size:10px">${unit}</span>`:""}</div>
      <div style="display:flex;gap:10px;align-items:center">
        <input class="ev-input" type="number" min="${min}" max="${max}" step="${step}" value="${val}"
          oninput="setEV('${key}',this.value)" style="width:90px">
        <input class="ev-slider" type="range" min="${min}" max="${max}" step="${step}" value="${val}"
          oninput="setEV('${key}',this.value)">
      </div>
    </div>`;
  }

  return `<div class="page anim-in">
    <div style="display:flex;gap:20px;flex-wrap:wrap">
      <!-- INPUTS -->
      <div style="width:300px;flex-shrink:0">
        <div class="panel panel-gold">
          <div class="panel-header"><span class="panel-title">Parámetros</span></div>
          <div class="panel-body" style="display:flex;flex-direction:column;gap:4px">
            ${numInput("pot","Tamaño del Bote",potBB,0.5,200,0.5,"BB")}
            ${numInput("bet","Tamaño de la Apuesta",betBB,0.5,150,0.5,"BB")}
            ${numInput("equity","Equity cuando llaman",Math.round(equity*100),0,100,1,"%")}
            ${numInput("foldEq","Fold Equity (villano foldea)",Math.round(foldEq*100),0,100,1,"%")}
            ${numInput("stack","Stack efectivo",stack,1,300,1,"BB")}
          </div>
        </div>
      </div>

      <!-- RESULTS -->
      <div style="flex:1;min-width:280px;display:flex;flex-direction:column;gap:14px">
        <!-- Main result -->
        <div class="panel panel-gold">
          <div class="panel-header"><span class="panel-title">Decisión Óptima</span></div>
          <div class="panel-body">
            <div style="text-align:center;padding:14px 0 18px;border-bottom:1px solid var(--border2);margin-bottom:18px">
              <div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;color:var(--text3);margin-bottom:8px">
                ${evBet>evCheck?"APOSTAR es +EV":"APOSTAR no es +EV vs checkear"}
              </div>
              <div class="ev-result-val" style="color:${evColor}">${diffSign}${evDiff.toFixed(2)} BB</div>
              <div class="ev-result-lbl">diferencia EV (apostar vs checkear)</div>
            </div>

            <div class="ev-compare">
              <div class="ev-comp-card">
                <div class="ev-comp-val" style="color:${evBet>0?"var(--green2)":"var(--red2)"}">${evBet.toFixed(2)}</div>
                <div class="ev-comp-lbl">EV Apostar</div>
              </div>
              <div class="ev-comp-card">
                <div class="ev-comp-val" style="color:var(--blue)">${evCheck.toFixed(2)}</div>
                <div class="ev-comp-lbl">EV Checkear</div>
              </div>
            </div>

            <div class="ev-breakdown">
              ${[
                ["Pot odds para villain",`${breakEvenEq.toFixed(1)}%`,"necesita para llamar"],
                ["Break-even fold equity",`${beFoldPct.toFixed(1)}%`,"mínimo para apuesta +EV"],
                ["Equity mínima al cobro",`${minEqPct.toFixed(1)}%`,"al ser llamado"],
                ["Bet/Pot ratio",`${(betBB/potBB*100).toFixed(0)}%`,"tamaño relativo"],
                ["SPR",spr.toFixed(1),"stack-to-pot ratio"],
              ].map(([l,v,sub])=>`<div class="ev-breakdown-row">
                <div>
                  <div class="ev-breakdown-lbl">${l}</div>
                  <div style="font-size:9px;color:var(--text4);font-family:'IBM Plex Mono',monospace">${sub}</div>
                </div>
                <div class="ev-breakdown-val" style="color:var(--gold)">${v}</div>
              </div>`).join("")}
            </div>
          </div>
        </div>

        <!-- Breakdown -->
        <div class="panel">
          <div class="panel-header"><span class="panel-title" style="font-size:15px">Desglose del EV</span></div>
          <div class="panel-body">
            <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px">
              ${[
                [`Gana al fold (${Math.round(foldEq*100)}%)`, (foldEq*potBB), "var(--green2)"],
                [`Gana al ser llamado`, (callFreq*equity*(potBB+betBB)), "var(--gold2)"],
                [`Pierde al ser llamado`, -(callFreq*(1-equity)*betBB), "var(--red2)"],
              ].map(([l,v,c])=>{
                const pct=Math.abs(v)/Math.max(Math.abs(evBet)+.1,1)*100;
                return `<div>
                  <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;font-family:'IBM Plex Mono',monospace">
                    <span style="color:var(--text3)">${l}</span>
                    <span style="color:${c};font-weight:600">${v>0?"+":""}${v.toFixed(2)} BB</span>
                  </div>
                  <div style="height:4px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden">
                    <div style="width:${Math.min(pct,100)}%;height:100%;background:${c};border-radius:2px;transition:width .5s"></div>
                  </div>
                </div>`;
              }).join("")}
            </div>
            <div class="ib ib-gold">
              <div class="ib-title" style="color:rgba(200,167,74,.7)">INTERPRETACIÓN</div>
              <div class="ib-body" style="font-size:12px">
                ${evBet>evCheck
                  ?`Apostar ${betBB} BB en un bote de ${potBB} BB es <strong style="color:var(--green2)">correcto</strong>. Con ${Math.round(foldEq*100)}% de fold equity y ${Math.round(equity*100)}% de equity al cobro, ganás ${evDiff.toFixed(2)} BB extra vs checkear.`
                  :`Apostar no es óptimo en esta situación. El villain necesita foldear al menos <strong style="color:var(--gold)">${beFoldPct.toFixed(1)}%</strong> para que la apuesta sea +EV vs checkear.`
                }
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function buildPickerModal(usedCards){
  const suitColors={s:"#e8e0cc",h:"#d95f5f",d:"#d95f5f",c:"#7ec8a0"};
  const suitSyms={s:"♠",h:"♥",d:"♦",c:"♣"};
  let rows="";
  for(const suit of ["s","h","d","c"]){
    for(const rank of RANKS){
      const card=rank+suit;
      const isUsed=usedCards.has(card);
      rows+=`<div class="cp-cell ${isUsed?"used":""}"
        style="color:${suitColors[suit]}"
        onclick="${isUsed?"":"pickCard('"+card+"')"}">${rank}<br>${suitSyms[suit]}</div>`;
    }
  }
  return `<div class="overlay" onclick="closePicker()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">♠ Seleccioná una carta</div>
      <div class="cp-grid">${rows}</div>
      <button class="btn-ghost" onclick="closePicker()" style="width:100%;text-align:center">Cancelar</button>
    </div>
  </div>`;
}

// ── PAGE ROUTER ──────────────────────────────────────────────────
function renderPage(){
  let html="";
  switch(S.tab){
    case"quiz":      html=renderQuiz();      break;
    case"scenarios": html=renderScenarios(); break;
    case"ranges":    html=renderRanges();    break;
    case"analyzer":  html=renderAnalyzer();  break;
    case"ev":        html=renderEV();        break;
  }
  document.getElementById("page").innerHTML=html;
  bindEvents2();
}

function bindEvents2(){
  document.querySelectorAll(".rg-cell").forEach(cell=>{
    cell.addEventListener("click",()=>{
      const row=parseInt(cell.dataset.row),col=parseInt(cell.dataset.col),pfx=cell.dataset.pfx;
      const h=handStr(row,col);
      if(pfx==="rm"){
        let c;
        if(S.rmMode==="rfi") c={hand:h,freq:RFI[S.rmPos]?.[h]||0,type:"rfi"};
        else{const d=BB_DEF[S.rmScen]?.[h]||{c:0,r:0};c={hand:h,call:d.c||0,raise:d.r||0,fold:100-(d.c||0)-(d.r||0),type:"bb"};}
        set({rmSel:{row,col,cell:c}});
      }
    });
  });
}

// Override the old render() to use renderPage()
function render(){renderPage();}

// EV state
S.ev={pot:10,bet:5,equity:45,foldEq:35,stack:100};
function setEV(key,val){S.ev=Object.assign({},S.ev,{[key]:parseFloat(val)||0});renderPage();}

// Init
render();
</script>
