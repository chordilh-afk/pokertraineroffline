function getQuizQuestion(mode, position) {
  if(mode==="rfi") {
    const rng=RFI[position]||RFI.BTN;
    const row=Math.floor(Math.random()*13), col=Math.floor(Math.random()*13);
    const hand=handStr(row,col);
    const freq=rng[hand]||0;
    return {hand, position, mode:"rfi", freqOpen:freq, freqFold:100-freq, row, col};
  } else {
    const scenarios_bb=["vs BTN","vs CO"];
    const scen=position||scenarios_bb[Math.floor(Math.random()*scenarios_bb.length)];
    const rng=BB_DEF[scen]||BB_DEF["vs BTN"];
    const row=Math.floor(Math.random()*13), col=Math.floor(Math.random()*13);
    const hand=handStr(row,col);
    const d=rng[hand]||{c:0,r:0};
    return {hand, scenario:scen, mode:"bb", freqCall:d.c||0, freqRaise:d.r||0, freqFold:100-(d.c||0)-(d.r||0), row, col};
  }
}

function evalQuizAnswer(q, action) {
  if(q.mode==="rfi") {
    const correct = q.freqOpen>=50?"open":"fold";
    const chosen = /fold/i.test(action)?"fold":"open";
    const diff = Math.abs(q.freqOpen - (chosen==="open"?q.freqOpen:q.freqFold));
    if(chosen===correct) {
      if(q.freqOpen>=90||q.freqOpen<=10) return {grade:"A",ok:true};
      if(q.freqOpen>=70||q.freqOpen<=30) return {grade:"B+",ok:true};
      return {grade:"C+",ok:true,note:"Mano mixta, ambas acciones son válidas"};
    } else {
      if(q.freqOpen>=85||q.freqOpen<=15) return {grade:"F",ok:false};
      if(q.freqOpen>=65||q.freqOpen<=35) return {grade:"D",ok:false};
      return {grade:"C",ok:false,note:"Mano muy mixta, no es un error grave"};
    }
  } else {
    const best = q.freqRaise>=40?"raise":q.freqCall>=40?"call":"fold";
    const chosen = /raise|3-?bet/i.test(action)?"raise":/call/i.test(action)?"call":"fold";
    const ok = chosen===best || 
      (best==="call"&&chosen==="raise"&&q.freqRaise>20) ||
      (best==="raise"&&chosen==="call"&&q.freqCall>20);
    if(ok) return {grade: q.freqFold<20?"A":"B+", ok:true};
    if(chosen==="fold"&&q.freqFold<30) return {grade:"D",ok:false};
    if(chosen==="fold"&&q.freqFold<10) return {grade:"F",ok:false};
    return {grade:"C",ok:false};
  }
}

function cardHTML(card, sz) {
  const dims={sm:[36,50,10,13],md:[48,66,13,17],lg:[58,80,16,21]}[sz||"md"];
  const [w,h,fr,fs]=dims;
  if(!card||card==="?") return `<div style="width:${w}px;height:${h}px;border-radius:5px;background:linear-gradient(135deg,#1a3a6e,#2a5ab8);border:2px solid rgba(255,255,255,.15);flex-shrink:0"></div>`;
  const rank=card.slice(0,-1),suit=card.slice(-1).toLowerCase();
  const col=(suit==="h"||suit==="d")?"#b91c1c":"#111";
  return `<div style="width:${w}px;height:${h}px;background:#fff;border-radius:5px;border:1px solid #ccc;padding:3px 4px;display:flex;flex-direction:column;box-shadow:0 2px 8px rgba(0,0,0,.45);flex-shrink:0"><span style="color:${col};font-size:${fr}px;font-weight:800;line-height:1;font-family:monospace">${rank}</span><span style="color:${col};font-size:${fs}px;line-height:1">${SUIT_SYM[suit]||suit}</span></div>`;
}

  return `<div style="padding:24px;display:flex;flex-direction:column;gap:16px">
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${filters.map(([id,lbl])=>`<button onclick="setState({scFilter:'${id}',scIdx:0,scResult:null})" style="padding:5px 14px;border-radius:6px;background:${s.scFilter===id?"rgba(201,168,76,.2)":"rgba(255,255,255,.04)"};border:1px solid ${s.scFilter===id?"rgba(201,168,76,.48)":"rgba(255,255,255,.08)"};color:${s.scFilter===id?"#c9a84c":"#8a9e8a"};font-size:10px;font-weight:700;font-family:monospace">${lbl}</button>`).join("")}
      <div style="flex:1"></div>
      <span style="font-size:11px;color:#8a9e8a;font-family:monospace;align-self:center">${(s.scIdx%filtered.length)+1} / ${filtered.length}</span>
    </div>

    <div style="background:#0c1e10;border:1px solid rgba(201,168,76,.22);border-radius:12px;padding:20px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <span style="padding:2px 9px;border-radius:10px;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;font-family:monospace;background:${stCol}18;color:${stCol};border:1px solid ${stCol}44">${sc.street}</span>
        <span style="font-size:9px;letter-spacing:2px;text-transform:uppercase;font-family:monospace;color:#8a9e8a">${sc.pos} vs ${sc.vpos}</span>
        <span style="font-size:9px;color:#8a9e8a;font-family:monospace;margin-left:auto">Bote: ${sc.pot} BB · Stack: ${sc.stack} BB</span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
        ${sc.cards.map(c=>cardHTML(c,"md")).join("")}
        ${sc.board.length>0?`<div style="width:1px;height:54px;background:rgba(201,168,76,.2);margin:0 4px"></div>`:""} 
        ${sc.board.map(c=>cardHTML(c,"sm")).join("")}
      </div>
      <div style="font-size:13px;color:#f0ead6;line-height:1.75;margin-bottom:16px">${sc.situation}${sc.toCall>0?`<br><span style="color:#c9a84c;font-family:monospace;font-size:12px">→ Te cuesta ${sc.toCall} BB llamar</span>`:""}</div>
      ${!res?`<div style="display:flex;gap:8px;flex-wrap:wrap">
        ${sc.actions.map(a=>{
          const col=/fold/i.test(a)?"#e74c3c":/call|check/i.test(a)?"#4caf7d":"#c9a84c";
          const id="sc-act-"+a.replace(/\s+/g,"-");
          return `<button data-action="${a}" class="sc-action" style="padding:11px 20px;border-radius:7px;background:${col}16;border:1px solid ${col}44;color:${col};font-size:13px;font-weight:700;font-family:sans-serif">${a}</button>`;
        }).join("")}
      </div>`:""}
    </div>

    ${resultSection}
  </div>`;
}

// ─── RANGES ─────────────────────────────────────────
function buildRanges(){
  const s=state;
  const C=34;

  function getCell(row,col){
    const h=handStr(row,col);
    if(s.rangeMode==="rfi") return {hand:h,freq:RFI[s.rangePos]?.[h]||0,type:"rfi"};
    const d=BB_DEF[s.rangeBbScen]?.[h]||{c:0,r:0};
    return {hand:h,call:d.c||0,raise:d.r||0,fold:100-(d.c||0)-(d.r||0),type:"bb"};
  }
  function getCellBg(row,col){const c=getCell(row,col);return c.type==="rfi"?rfiColor(c.freq):bbColor(c.call,c.raise);}

  let totalC=0;
  for(let i=0;i<13;i++)for(let j=0;j<13;j++){
    const c=getCell(i,j);
    totalC+=c.type==="rfi"?combos(c.hand)*(c.freq/100):combos(c.hand)*((c.call+c.raise)/100);
  }
  const pct=(totalC/1326*100).toFixed(1);

  // Build grid
  let gridRows="";
  for(let row=0;row<13;row++){
    let cells="";
    for(let col=0;col<13;col++){
      const h=handStr(row,col);
      const bg=getCellBg(row,col);
      const isSel=s.rangeSelected&&s.rangeSelected.row===row&&s.rangeSelected.col===col;
      const isPair=row===col,isSuit=row<col;
      const label=isPair?h:isSuit?`${RANKS[row]}${RANKS[col]}s`:`${RANKS[col]}${RANKS[row]}o`;
      cells+=`<div data-row="${row}" data-col="${col}" class="range-cell" style="width:${C-1}px;height:${C-1}px;margin:0 1px 0 0;border-radius:2px;background:${bg};border:${isSel?"1.5px solid rgba(255,255,255,.7)":"1px solid transparent"};cursor:pointer;display:flex;align-items:center;justify-content:center">
        <span style="font-size:7.5px;font-family:monospace;font-weight:700;color:${isPair?"#f0ead6":isSuit?"#a8d5be":"#d5c8a8"};line-height:1;opacity:.9">${label}</span>
      </div>`;
    }
    gridRows+=`<div style="display:flex;margin-bottom:1px">
      <div style="width:${C}px;font-size:9px;color:rgba(240,234,214,.4);font-family:monospace;font-weight:700;display:flex;align-items:center;justify-content:center">${RANKS[row]}</div>
      ${cells}
    </div>`;
  }

  // Selected panel
  let selPanel="";
  if(s.rangeSelected){
    const cell=s.rangeSelected.cell;
    const freqs=cell.type==="rfi"
      ?[["Abrir",cell.freq,"#4caf7d"],["Fold",100-cell.freq,"#e74c3c"]]
      :[["3-Bet",cell.raise,"#4caf7d"],["Call",cell.call,"#60a5fa"],["Fold",cell.fold,"#e74c3c"]];
    
    // GTO tip
    let tip="";
    if(cell.type==="rfi"){
      if(cell.freq>=90) tip=`Apertura estándar al 100% desde ${s.rangePos}. Mano demasiado fuerte para fold.`;
      else if(cell.freq>=65) tip=`Apertura frecuente (~${cell.freq}%). Parte del rango core de ${s.rangePos}.`;
      else if(cell.freq>=35) tip=`Mano mixta (~${cell.freq}%). GTO abre y foldea a veces. Depende de la dinámica.`;
      else if(cell.freq>0) tip=`Apertura poco frecuente (${cell.freq}%). Parte del rango de balance, no obligatoria.`;
      else tip=`Fold desde ${s.rangePos}. Esta mano no tiene suficiente equity para abrir en esta posición.`;
    } else {
      const best=cell.raise>=40?"3-bet":cell.call>=40?"call":"fold";
      if(best==="3-bet") tip=`3-bet frecuente (${cell.raise}%) como valor o semi-bluff. Mano muy fuerte o con buen bloqueador.`;
      else if(best==="call") tip=`Defensa principalmente llamando (${cell.call}%). Buen precio para ver el flop.`;
      else tip=`Fold frecuente (${cell.fold}%). No alcanza el umbral de defensa ${s.rangeBbScen}.`;
    }

    selPanel=`<div style="background:#0b1a0e;border:1px solid rgba(201,168,76,.22);border-radius:10px;padding:18px;margin-top:12px">
      <div style="display:flex;gap:10px;align-items:baseline;margin-bottom:12px">
        <span style="font-size:26px;font-weight:800;color:#c9a84c;font-family:monospace">${cell.hand}</span>
        <span style="font-size:10px;color:#8a9e8a;font-family:monospace">${combos(cell.hand)} combos</span>
      </div>
      ${freqs.map(([a,p,col])=>`<div style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;font-family:monospace;color:#8a9e8a"><span>${a}</span><span style="color:${col}">${p}%</span></div>
        <div style="height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden"><div style="width:${p}%;height:100%;background:${col};border-radius:3px;transition:width .4s"></div></div>
      </div>`).join("")}
      <div style="background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.18);border-radius:7px;padding:12px;margin-top:8px">
        <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(201,168,76,.6);font-family:monospace;margin-bottom:5px">POR QUÉ</div>
        <div style="font-size:12px;color:#f0ead6;line-height:1.75">${tip}</div>
      </div>
    </div>`;
  }

  return `<div style="padding:20px 24px">
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px">
      ${[["rfi","RFI — Apertura","rgba(201,168,76,.18)","rgba(201,168,76,.5)","#c9a84c"],["bb","BB Defensa","rgba(76,175,125,.18)","rgba(76,175,125,.5)","#4caf7d"]].map(([id,lbl,bg,bd,col])=>
        `<button onclick="setState({rangeMode:'${id}',rangeSelected:null})" style="padding:7px 16px;border-radius:7px;background:${s.rangeMode===id?bg:"rgba(255,255,255,.04)"};border:1px solid ${s.rangeMode===id?bd:"rgba(255,255,255,.1)"};color:${s.rangeMode===id?col:"#8a9e8a"};font-size:10px;font-weight:700;letter-spacing:1px;font-family:monospace">${lbl}</button>`
      ).join("")}
      <div style="flex:1"></div>
      <span style="font-size:11px;font-family:monospace;color:#8a9e8a"><span style="color:#c9a84c">${Math.round(totalC)}</span> combos · <span style="color:#c9a84c">${pct}%</span></span>
    </div>
    <div style="display:flex;gap:5px;margin-bottom:14px">
      ${s.rangeMode==="rfi"
        ?["UTG","HJ","CO","BTN","SB"].map(p=>`<button onclick="setState({rangePos:'${p}',rangeSelected:null})" style="padding:5px 13px;border-radius:6px;background:${s.rangePos===p?"rgba(201,168,76,.2)":"rgba(255,255,255,.04)"};border:1px solid ${s.rangePos===p?"rgba(201,168,76,.48)":"rgba(255,255,255,.08)"};color:${s.rangePos===p?"#c9a84c":"#8a9e8a"};font-size:10px;font-weight:700;font-family:monospace">${p}</button>`).join("")
        :["vs BTN","vs CO"].map(sc=>`<button onclick="setState({rangeBbScen:'${sc}',rangeSelected:null})" style="padding:5px 13px;border-radius:6px;background:${s.rangeBbScen===sc?"rgba(76,175,125,.2)":"rgba(255,255,255,.04)"};border:1px solid ${s.rangeBbScen===sc?"rgba(76,175,125,.48)":"rgba(255,255,255,.08)"};color:${s.rangeBbScen===sc?"#4caf7d":"#8a9e8a"};font-size:10px;font-weight:700;font-family:monospace">${sc}</button>`).join("")
      }
    </div>
    <div style="overflow-x:auto">
      <div style="user-select:none;min-width:${C*14}px">
        <div style="display:flex;margin-bottom:1px">
          <div style="width:${C}px"></div>
          ${RANKS.map(r=>`<div style="width:${C}px;text-align:center;font-size:9px;color:rgba(240,234,214,.4);font-family:monospace;font-weight:700">${r}</div>`).join("")}
        </div>
        ${gridRows}
      </div>
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:10px">
      ${s.rangeMode==="rfi"
        ?[[100,"100%"],[70,"70%"],[50,"50%"],[30,"30%"],[10,"10%"],[0,"Fold"]].map(([f,l])=>`<div style="display:flex;align-items:center;gap:5px"><div style="width:11px;height:11px;border-radius:2px;background:${rfiColor(f)};border:1px solid rgba(255,255,255,.1)"></div><span style="font-size:9px;color:#8a9e8a;font-family:monospace">${l}</span></div>`).join("")
        :[[0,80,"3-bet"],[0,30,"3-bet mix"],[70,0,"Call"],[30,0,"Call mix"],[0,0,"Fold"]].map(([c,r,l])=>`<div style="display:flex;align-items:center;gap:5px"><div style="width:11px;height:11px;border-radius:2px;background:${bbColor(c,r)};border:1px solid rgba(255,255,255,.1)"></div><span style="font-size:9px;color:#8a9e8a;font-family:monospace">${l}</span></div>`).join("")
      }
    </div>
    <div style="font-size:11px;color:rgba(201,168,76,.5);margin-top:8px;font-family:monospace">↑ Click en cualquier mano para ver el análisis</div>
    ${selPanel}
  </div>`;
}

// ═══════════════════════════════════════════════════
//  EVENT BINDING
// ═══════════════════════════════════════════════════
function bindEvents(){
  // Quiz - new question
  const btnNewQ=document.getElementById("btn-new-q");
  if(btnNewQ){
    btnNewQ.addEventListener("click",()=>{
      const q=getQuizQuestion(state.quizMode, state.quizMode==="rfi"?state.quizPos:state.quizBbScen);
      setState({quizQ:q,quizResult:null});
    });
  }

  // Quiz - answer buttons
  const qOpen=document.getElementById("quiz-open");
  if(qOpen) qOpen.addEventListener("click",()=>answerQuiz("open"));
  const qFold=document.getElementById("quiz-fold");
  if(qFold) qFold.addEventListener("click",()=>answerQuiz("fold"));
  const qRaise=document.getElementById("quiz-raise");
  if(qRaise) qRaise.addEventListener("click",()=>answerQuiz("raise"));
  const qCall=document.getElementById("quiz-call");
  if(qCall) qCall.addEventListener("click",()=>answerQuiz("call"));

  // Scenarios - action buttons
  document.querySelectorAll(".sc-action").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const action=btn.getAttribute("data-action");
      const sc=getFilteredScenarios()[state.scIdx % getFilteredScenarios().length];
      const gradeMap=sc.grade;
      // Find matching grade key
      let grade="C";
      for(const [key,g] of Object.entries(gradeMap)){
        if(action.toLowerCase().includes(key.toLowerCase())||key.toLowerCase().includes(action.toLowerCase())){grade=g;break;}
        if(sc.correct&&action.toLowerCase().includes(sc.correct.toLowerCase())){grade="A";break;}
      }
      // Direct lookup
      grade=gradeMap[action]||grade;
      setState({scResult:{grade,action}});
    });
  });

  // Scenarios - next
  const btnNextSc=document.getElementById("btn-next-sc");
  if(btnNextSc){
    btnNextSc.addEventListener("click",()=>{
      setState({scIdx:state.scIdx+1,scResult:null});
    });
  }

  // Ranges - cell clicks
  document.querySelectorAll(".range-cell").forEach(cell=>{
    cell.addEventListener("click",()=>{
      const row=parseInt(cell.getAttribute("data-row"));
      const col=parseInt(cell.getAttribute("data-col"));
      const h=handStr(row,col);
      let cellData;
      if(state.rangeMode==="rfi"){
        cellData={hand:h,freq:RFI[state.rangePos]?.[h]||0,type:"rfi"};
      } else {
        const d=BB_DEF[state.rangeBbScen]?.[h]||{c:0,r:0};
        cellData={hand:h,call:d.c||0,raise:d.r||0,fold:100-(d.c||0)-(d.r||0),type:"bb"};
      }
      setState({rangeSelected:{row,col,cell:cellData}});
    });
  });
}

function getFilteredScenarios(){
  return state.scFilter==="all"?SCENARIOS:SCENARIOS.filter(sc=>sc.street===state.scFilter);
}

function answerQuiz(action){
  if(!state.quizQ||state.quizResult)return;
  const res=evalQuizAnswer(state.quizQ,action);
  const newStats={
    n:state.quizStats.n+1,
    correct:state.quizStats.correct+(res.ok?1:0),
    grades:Object.assign({},state.quizStats.grades,{[res.grade]:(state.quizStats.grades[res.grade]||0)+1})
  };
  setState({quizResult:res,quizStats:newStats});
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
render();
</script>
